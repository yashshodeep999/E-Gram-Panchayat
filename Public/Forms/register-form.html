<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grampanchayat Register</title>

<style>
  body { background:#f5f5f5; font-family:"Noto Serif Devanagari","Mangal",serif; }
  .page { width:210mm; min-height:297mm; background:#fff; margin:20px auto; padding:15mm; box-shadow:0 0 5px rgba(0,0,0,.2); }
  h2,h3 { text-align:center; margin:5px 0; }
  .top-bar { border-top:8px solid #666; margin-bottom:10px; text-align:center; font-size:12px; padding-top:4px; }
  .toolbar { display:flex; gap:10px; justify-content:center; margin:10px 0 15px; flex-wrap:wrap; }
  button { padding:8px 12px; border:1px solid #222; background:#fff; cursor:pointer; }
  button:hover { background:#f0f0f0; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th,td { border:1px solid #000; padding:4px; text-align:center; }
  th { background:#f0f0f0; font-weight:bold; }
  input { width:100%; border:none; outline:none; font-size:12px; font-family:inherit; text-align:center; background:transparent; }
  input:focus { background:#ffffcc; }
  .footer { margin-top:25px; display:flex; justify-content:space-between; font-size:12px; }
  .sign { text-align:right; }
  .msg { text-align:center; font-size:12px; margin-top:8px; }

  @media print {
    body { background:none; }
    .page { box-shadow:none; margin:0; }
    .toolbar, .msg { display:none; }
    input { background:transparent; }
  }
</style>
</head>

<body>

<div class="page">

  <div class="top-bar">www.mahigramapanchayat.com</div>

  <h2>ग्रामपंचायत नोंदवही</h2>
  <h3>(Register)</h3>

  <div class="toolbar">
    <button type="button" onclick="window.print()">Print / Save PDF</button>
    <button type="button" id="btnClear">Clear</button>
    <button type="button" id="btnSave">Save to MongoDB</button>
    <button type="button" id="btnLoad">Load from MongoDB</button>
  </div>

  <div id="msg" class="msg"></div>

  <table>
    <thead>
      <tr>
        <th>अ.क्र.</th>
        <th>दिनांक</th>
        <th>अर्जदाराचे नाव</th>
        <th>प्रमाणपत्राचा प्रकार</th>
        <th>रक्कम (₹)</th>
        <th>पावती क्र.</th>
        <th>स्वाक्षरी</th>
        <th>शेरा</th>
      </tr>
    </thead>

    <tbody id="rowsBody">
      <!-- rows generated by JS -->
    </tbody>
  </table>

  <div class="footer">
    <div>
      ठिकाण: <input id="place" style="width:150px">
      <br><br>
      दिनांक: <input id="footerDate" type="date" style="width:150px">
    </div>

    <div class="sign">
      सही व शिक्का<br>
      सरपंच / ग्रामसेवक
    </div>
  </div>

</div>

<!-- ✅ Mongo helper -->
<script src="api.js"></script>

<script>
/* =========================
   ROW GENERATION (20 rows)
========================= */
const rowsBody = document.getElementById("rowsBody");
function makeRow(i){
  return `
  <tr>
    <td><input data-k="r${i}_sr"></td>
    <td><input type="date" data-k="r${i}_date"></td>
    <td><input data-k="r${i}_name"></td>
    <td><input data-k="r${i}_cert"></td>
    <td><input data-k="r${i}_amt"></td>
    <td><input data-k="r${i}_rcpt"></td>
    <td><input data-k="r${i}_sign"></td>
    <td><input data-k="r${i}_remark"></td>
  </tr>`;
}
(function initRows(){
  let html = "";
  for(let i=1;i<=20;i++) html += makeRow(i);
  rowsBody.innerHTML = html;
})();

function setMsg(text, ok=true){
  const el = document.getElementById("msg");
  el.style.color = ok ? "green" : "red";
  el.textContent = text;
}

function getAllInputs(){
  return Array.from(document.querySelectorAll("input[data-k]"));
}

function snapshot(){
  const data = {};
  getAllInputs().forEach(inp => {
    data[inp.getAttribute("data-k")] = (inp.value || "").trim();
  });
  // footer fields
  data._place = (document.getElementById("place").value || "").trim();
  data._footerDate = document.getElementById("footerDate").value || "";
  return data;
}

function restore(data){
  getAllInputs().forEach(inp => {
    const k = inp.getAttribute("data-k");
    inp.value = (data && data[k]) ? data[k] : "";
  });
  document.getElementById("place").value = data? (data._place || "") : "";
  document.getElementById("footerDate").value = data? (data._footerDate || "") : "";
}

function clearAll(){
  getAllInputs().forEach(inp => inp.value = "");
  document.getElementById("place").value = "";
  document.getElementById("footerDate").value = "";
}

/* =========================
   SAVE / LOAD MongoDB
   formType: "register"
========================= */
function genRegisterId(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  const rand = Math.floor(1000 + Math.random()*9000);
  return `REG-${y}${m}${day}-${rand}`;
}

document.getElementById("btnClear").addEventListener("click", () => {
  if(confirm("Clear all rows?")) clearAll();
});

document.getElementById("btnSave").addEventListener("click", async () => {
  const data = snapshot();

  // optional: link to current applicant regNo
  const raw = localStorage.getItem("GP_APPLICANT");
  const applicant = raw ? JSON.parse(raw) : {};
  const applicationNo = applicant.regNo || "";

  // create registerId once
  let registerId = localStorage.getItem("GP_REGISTER_ID");
  if(!registerId){
    registerId = genRegisterId();
    localStorage.setItem("GP_REGISTER_ID", registerId);
  }

  const payload = {
    registerId,
    applicationNo,
    createdAtISO: new Date().toISOString(),
    data
  };

  try{
    // prevent multiple saves for same registerId
    const key = "GP_REGISTER_SAVED_" + registerId;
    if(localStorage.getItem(key) === "YES"){
      setMsg("✅ Already saved in DB for this Register ID: " + registerId, true);
      return;
    }

    const r = await submitToMongo("register", payload);
    if(r && r.success){
      localStorage.setItem(key, "YES");
      localStorage.setItem("GP_REGISTER_DB_ID", r.id);
      setMsg("✅ Saved to MongoDB! DB ID: " + r.id, true);
    }else{
      setMsg("❌ Save failed. Check server.", false);
      console.log("Register save failed:", r);
    }
  }catch(err){
    setMsg("❌ Mongo error. Check server.", false);
    console.log(err.message);
  }
});

/* Load latest register from DB:
   This needs backend route: GET /api/register/latest
   If you don't have it yet, I give you backend code below.
*/
document.getElementById("btnLoad").addEventListener("click", async () => {
  try{
    const res = await fetch("http://localhost:5000/api/register/latest");
    const r = await res.json();
    if(r && r.ok && r.doc && r.doc.data){
      restore(r.doc.data);
      if(r.doc.registerId) localStorage.setItem("GP_REGISTER_ID", r.doc.registerId);
      setMsg("✅ Loaded latest register from DB.", true);
    }else{
      setMsg("❌ No register found in DB.", false);
    }
  }catch(err){
    setMsg("❌ Load error. Add backend route /api/register/latest", false);
    console.log(err.message);
  }
});
</script>
<script src="api.js"></script>

</body>
</html>
