<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - E-Grampanchayat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Admin Dashboard</h3>
    <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
  </div>

  <div class="alert alert-info">
    ✅ Logged in as <b>ADMIN</b>. Only Admin can Add/Update/Delete members.
  </div>

  <!-- Add Member Form -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="mb-3">Add Executive Board Member</h5>

      <div class="row g-3">
        <div class="col-md-4">
          <input id="name" class="form-control" placeholder="Name">
        </div>
        <div class="col-md-4">
          <input id="position" class="form-control" placeholder="Position">
        </div>
        <div class="col-md-4">
          <input id="bio" class="form-control" placeholder="Short Bio">
        </div>
        <div class="col-md-6">
          <input id="image" type="file" class="form-control" accept="image/*">
        </div>
        <div class="col-md-6">
          <button class="btn btn-dark w-100" onclick="addMember()">Add Member</button>
        </div>
      </div>

      <p id="msg" class="mt-3"></p>
    </div>
  </div>

  <!-- Members List -->
  <div class="card shadow-sm">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="mb-0">Members List</h5>
        <button class="btn btn-sm btn-outline-dark" onclick="loadMembers()">Refresh</button>
      </div>
      <div id="members" class="row g-3 mt-1"></div>
    </div>
  </div>
</div>

<!-- ✅ Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Update Member</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="editId">

        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Name</label>
            <input id="editName" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Position</label>
            <input id="editPosition" class="form-control">
          </div>

          <div class="col-md-4">
            <label class="form-label">Bio</label>
            <input id="editBio" class="form-control">
          </div>

          <div class="col-md-12">
            <label class="form-label">New Image (optional)</label>
            <input id="editImage" type="file" class="form-control" accept="image/*">
          </div>
        </div>

        <p id="editMsg" class="mt-3"></p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-dark" onclick="updateMember()">Update</button>
      </div>

    </div>
  </div>
</div>

<!-- ✅ Scripts only once (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./admin.js"></script>
<script>
  // load on start
  loadMembers();
</script>

</body>
</html>
