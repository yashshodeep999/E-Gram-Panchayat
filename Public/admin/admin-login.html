<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - E-Grampanchayat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h3 class="text-center mb-4">Admin Login</h3>

          <label class="form-label">Username</label>
          <input id="username" class="form-control mb-3" placeholder="admin" />

          <label class="form-label">Password</label>
          <input id="password" type="password" class="form-control mb-3" placeholder="admin123" />

          <button class="btn btn-dark w-100" onclick="login()">Login</button>

          <p id="msg" class="mt-3 text-center text-danger"></p>
        </div>
      </div>

      <p class="text-center text-muted mt-3">
        Backend should be running on <b>http://localhost:5000</b>
      </p>
    </div>
  </div>
</div>

<script>
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");
  msg.textContent = "";

  try {
    const res = await fetch("http://localhost:5000/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.textContent = data.msg || "Login failed";
      return;
    }

    // ✅ Save token + role
    localStorage.setItem("token", data.token);
    localStorage.setItem("role", data.role);

    // ✅ Redirect
    window.location.href = "admin-dashboard.html";
  } catch (err) {
    msg.textContent = "Server not reachable. Start backend first.";
  }
}
</script>

</body>
</html>
